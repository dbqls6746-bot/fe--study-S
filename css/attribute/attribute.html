<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>

    /*  색상 키워드 표기 */
    .cls1 { color: blueviolet;}

    /* RGB 표기 */
    /* Red Green Blue 0~255 */
    .cls2{ color: rgb(11, 88, 156)}

    /* RGBA : RGB + Alpha 투명도 (투명0 ~ 1불투명) */
    .cls3 { color: rgb(55,66,77, 0.3)}

    /* 16진수 HEX 표기 00~ff */
    /* RGB 0 255 0 */
    /* HEX 00 FF 00 */
    .cls4 { color: #0cf56b;}
</style>

</head>
<body>
    <h1 class="cls1">color ckeck cls1</h1>

    <h1 class="cls2">color ckeck cls2</h1>

    <h1 class="cls3">color ckeck cls3</h1>

    <h1 class="cls4">color ckeck cls4</h1>
</body>
</html>
