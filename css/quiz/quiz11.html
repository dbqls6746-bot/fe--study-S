<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        .container {
            width: 800px;
            margin: 0 auto;
            border: 1px solid black;
        }

        .header {
            display: flex;
        }

        .header-left {
            width: 50%;
            height: 100px;
            background-color: yellow;
            border: 1px solid black;
        }

        .header-right {
            width: 50%;
            height: 100px;
            background-color: gray;
            border: 1px solid black;
        }

        .nav {
            width: 100%;
            height: 100px;
            background-color: purple;
        }

        .main-left {
            width: 40%;
            height: 200px;
            background-color: lightblue;
            border: 1px solid black;
        }

        .main-right1 {
            height: 100px;
            background-color: yellow;
            border: 1px solid black;
        }

        .main-right2 {
            height: 100px;
            background-color: orange;
            border: 1px solid black;
        }

        .main-right {
            width: 60%;
            height: 200px;
            background-color: antiquewhite;
        }

        .main {
            display: flex;
        }

        .footer1 {
            width: 25%;
            height: 100px;
            background-color: yellow;
            border: 1px solid black;
        }

        .footer2 {
            width: 25%;
            height: 100px;
            background-color: orange;
            border: 1px solid black;
        }

        .footer3 {
            width: 25%;
            height: 100px;
            background-color: yellow;
            border: 1px solid black;
        }

        .footer4 {
            width: 25%;
            height: 100px;
            background-color: green;
            border: 1px solid black;
        }

        .footer {
            display: flex;
        }
    </style>

</head>

<body>

    <div class="container">
        <div class="header">
            <div class="header-left"></div>
            <div class="header-right"></div>
        </div>
        <div class="nav"></div>
        <div class="main">
            <div class="main-left"></div>
            <div class="main-right">
                <div class="main-right1"></div>
                <div class="main-right2"></div>
            </div>
        </div>
        <div class="footer">
            <div class="footer1"></div>
            <div class="footer2"></div>
            <div class="footer3"></div>
            <div class="footer4"></div>
        </div>
    </div>

</body>

</html>
