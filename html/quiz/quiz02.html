<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="#">
        <label for="name">고객명 : </label>
        <input type="text">

        <br>

        <label for="phone">전화번호 : </label>
        <input type="text">

        <br>

        <label for="email">E-mail : </label>
        <input type="text">

        <p>
            <label for="selectpz">피자선택 : </label>
            <select id="selectpz">
                <option value="1">피자를 선택하세요</option>
                <option value="2">치즈 피자</option>
                <option value="3">페페로니 피자</option>
                <option value="4">콤비네이션 피자</option>
            </select>
        </p>
        
        <fieldset>
            <legend>피자 사이즈</legend>
                <label><input type="radio"  value="small">Small</label>
                <br><br>
                <label><input type="radio"  value="medium">Medium</label>
                <br><br>
                <label><input type="radio"  value="large">Large</label>
                <br><br>
        </fieldset>

        <fieldset>
            <legend>토핑선택</legend>
                <label><input type="checkbox" value="bacon">베이컨</label>
                <br><br>
                <label><input type="checkbox" value="cheese">치즈</label>
                <br><br>
                <label><input type="checkbox" value="onion">양파</label>
                <br><br>
                <label><input type="checkbox" value="mushroom">버섯</label>
                <br><br>
        </fieldset>

        <p>
            <label for="selectcf">희망배송시간 :</label>
            <input type="time"><br>
        </p>

        <label>배송시 요청사항 : <textarea></textarea></label>
    
        <br><br>

        <button type="order">주문하기</button>

    </form>
</body>
</html>
